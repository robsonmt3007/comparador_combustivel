    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combustível Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --primary: #27ae60; --secondary: #2980b9; --bg: #121212;
            --card: #1e1e1e; --text: #ffffff; --danger: #e74c3c;
            --input-bg: #2c2c2c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .app-card {
            background: var(--card); padding: 1.5rem; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 100%; max-width: 380px; text-align: center;
        }

        /* Estilo do Status de Conexão */
        #status-conexao {
            font-size: 0.65rem; font-weight: bold; padding: 6px 14px; border-radius: 20px; 
            margin-bottom: 12px; display: inline-block; transition: all 0.4s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .online { background: rgba(39, 174, 96, 0.2); color: var(--primary); border: 1px solid var(--primary); }
        .offline { background: rgba(231, 76, 60, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        h1 { font-size: 1.1rem; margin-bottom: 1.2rem; font-weight: 800; color: #eee; }
        .input-container { margin-bottom: 0.8rem; text-align: left; }
        label { display: block; margin-bottom: 4px; font-size: 0.65rem; font-weight: bold; opacity: 0.7; }
        
        /* Prevenção de Zoom no iOS (font-size 16px) */
        input, select {
            width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid #3d3d3d;
            border-radius: 14px; font-size: 16px; color: #fff; text-align: center; box-sizing: border-box; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--secondary); }

        .button-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 14px; border: none; border-radius: 14px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; }
        .btn-calc { background: white; color: black; } 
        .btn-clear { background: #333; color: var(--danger); }
        button:active { transform: scale(0.96); opacity: 0.8; }

        .brand-section { margin-top: 25px; }
        .section-label { 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: #888; font-weight: 800; 
            margin-bottom: 15px; letter-spacing: 1.5px; text-transform: uppercase;
        }
        .section-label::before, .section-label::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }
        
        .grid-icons { display: flex; justify-content: space-around; align-items: center; gap: 10px; padding: 5px 0; flex-wrap: wrap;}
        .btn-icon-base { background: transparent; border: none; padding: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        .btn-icon-base img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5)); }

        .gps-size { width: 100px; height: 100px; }
        .posto-size { width: 75px; height: 75px; }

        /* Resultado com Transição Suave */
        #resultado { 
            margin-top: 1.2rem; padding: 20px; border-radius: 18px; 
            display: none; animation: slideUp 0.4s ease; color: #fff;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .melhor-etanol { background: #1b4332; border: 2px solid var(--primary); }
        .melhor-gasolina { background: #1a3a5a; border: 2px solid var(--secondary); }

        .historico-item { display: flex; justify-content: space-between; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 6px; font-size: 0.75rem; border: 1px solid #2a2a2a; }
        .historico-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-delete-hist { background: transparent; color: #555; font-size: 1.1rem; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="status-conexao">VERIFICANDO...</div>
    <h1>⛽ Gasolina ou Etanol?</h1>
    
    <form id="calcForm" onsubmit="event.preventDefault(); calcular();">
        <div class="input-container">
            <label style="color:var(--primary)">PREÇO ETANOL *</label>
            <input type="text" id="etanol" placeholder="0,00" inputmode="decimal" required oninput="mascaraMoeda(this)">
        </div>
        <div class="input-container">
            <label style="color:var(--secondary)">PREÇO GASOLINA *</label>
            <input type="text" id="gasolina" placeholder="0,00" inputmode="decimal" required oninput="mascaraMoeda(this)">
        </div>
        <div class="input-container">
            <label style="color:#888">VALOR DISPONÍVEL (R$)</label>
            <input type="text" id="valorAbast" placeholder="0,00" inputmode="decimal" oninput="mascaraMoeda(this)">
        </div>
        <div class="input-container">
            <label style="color:#888">ANO DO VEÍCULO</label>
            <select id="regra" onchange="salvarConfig()">
                <option value="0.70">Até 2012 (70%)</option>
                <option value="0.72">2013-2020 (72%)</option>
                <option value="0.75" selected>2021+ ou Turbo (75%)</option>
            </select>
        </div>
        <div class="button-group"><button type="submit" class="btn-calc">CALCULAR</button><button type="button" class="btn-clear" onclick="limpar()">LIMPAR</button></div>
    </form>

    <div id="resultado">
        <span id="veredito" style="font-weight:900; display:block; font-size: 1.1rem; text-transform:uppercase;"></span>
        <span id="detalhe" style="font-size:0.8rem; display:block; opacity: 0.9;"></span>
        <div id="litros-info" style="font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.1); margin-top:8px; padding-top:8px;"></div>
    </div>

    <div class="brand-section">
        <div class="section-label">Procura no GPS</div>
        <div class="grid-icons">
            <button class="btn-icon-base gps-size" onclick="verificarGps('Posto de Gasolina', 'google')"><img src="maps.png" alt="Maps"></button>
            <button class="btn-icon-base gps-size" onclick="verificarGps('Posto de Gasolina', 'waze')"><img src="waze.png" alt="Waze"></button>
        </div>
    </div>

    <div class="brand-section">
        <div class="section-label">Postos por Bandeira</div>
        <div class="grid-icons">
            <button class="btn-icon-base posto-size" onclick="verificarGps('Posto Ipiranga', 'google')"><img src="ipiranga.png" alt="Ipiranga"></button>
            <button class="btn-icon-base posto-size" onclick="verificarGps('Posto Shell', 'google')"><img src="shell.png" alt="Shell"></button>
            <button class="btn-icon-base posto-size" onclick="verificarGps('Posto Petrobras BR', 'google')"><img src="br.png" alt="BR"></button>
            <button class="btn-icon-base posto-size" onclick="verificarGps('Rede Ceará', 'google')"><img src="ceara.png" alt="Ceará"></button>
        </div>
    </div>

    <div class="historico-header"><label style="color:#555; margin:0; font-size: 0.6rem;">HISTÓRICO RECENTE</label><button class="btn-delete-hist" onclick="apagarHistorico()">🗑️</button></div>
    <div id="lista-historico"></div>
</div>

<script>
    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => console.log('SW ok'));
        });
    }

    // Lógica de Status Online/Offline Corrigida
    function atualizarStatus() {
        const s = document.getElementById('status-conexao');
        if (navigator.onLine) {
            s.innerText = "● SISTEMA ONLINE";
            s.className = "online";
        } else {
            s.innerText = "○ MODO OFFLINE";
            s.className = "offline";
        }
    }

    window.addEventListener('online', atualizarStatus);
    window.addEventListener('offline', atualizarStatus);

    window.onload = () => {
        atualizarStatus(); // Verifica no carregamento
        const salva = localStorage.getItem('regraComb');
        if (salva) document.getElementById('regra').value = salva;
        mostrarHistorico();
    };

    function verificarGps(destino, tipo) {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(() => { buscar(destino, tipo); }, () => { buscar(destino, tipo); });
        } else { buscar(destino, tipo); }
    }

    function buscar(m, t) {
        let q = encodeURIComponent(m + (m.includes("Gasolina") ? "" : " Gasolina"));
        if (t === 'waze') {
            window.location.href = `waze://?q=${q}&navigate=yes`;
        } else {
            window.open(`https://www.google.com/maps/search/${q}`, '_blank');
        }
    }

    function mascaraMoeda(c) {
        let v = c.value.replace(/\D/g, "");
        if (v.length === 0) { c.value = ""; return; }
        c.value = (parseFloat(v) / 100).toFixed(2).replace(".", ",");
    }

    function calcular() {
        const e = parseFloat(document.getElementById('etanol').value.replace(",", "."));
        const g = parseFloat(document.getElementById('gasolina').value.replace(",", "."));
        const v = parseFloat(document.getElementById('valorAbast').value.replace(",", ".")) || 0;
        const r = parseFloat(document.getElementById('regra').value);
        if (!e || !g) return;
        const rel = e / g;
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block';
        const escolha = rel <= r ? "Etanol" : "Gasolina";
        resDiv.className = escolha === "Etanol" ? 'melhor-etanol' : 'melhor-gasolina';
        document.getElementById('veredito').innerText = `Abastecer com ${escolha}`;
        document.getElementById('detalhe').innerText = `Relação: ${(rel * 100).toFixed(1)}%`;
        if (v > 0) document.getElementById('litros-info').innerHTML = `R$ ${v.toFixed(2)} rende:<br><b>${(v/e).toFixed(2)}L</b> de Etanol ou <b>${(v/g).toFixed(2)}L</b> de Gasolina`;
        else document.getElementById('litros-info').innerHTML = "";
        salvarNoHistorico(escolha, e, g);
    }

    function salvarNoHistorico(esc, e, g) {
        let h = JSON.parse(localStorage.getItem('histComb') || "[]");
        h.unshift({ data: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}), escolha: esc, precos: `${e.toFixed(2)} | ${g.toFixed(2)}` });
        localStorage.setItem('histComb', JSON.stringify(h.slice(0, 3)));
        mostrarHistorico();
    }

    function mostrarHistorico() {
        const h = JSON.parse(localStorage.getItem('histComb') || "[]");
        document.getElementById('lista-historico').innerHTML = h.map(i => `<div class="historico-item"><span style="color:#777">${i.data}</span><span style="font-weight:bold">${i.escolha}</span><span style="color:#777">${i.precos}</span></div>`).join('');
    }

    function limpar() { document.getElementById('calcForm').reset(); document.getElementById('resultado').style.display = "none"; }
    function apagarHistorico() { if(confirm("Apagar histórico?")) { localStorage.removeItem('histComb'); mostrarHistorico(); } }
    function salvarConfig() { localStorage.setItem('regraComb', document.getElementById('regra').value); }
</script>
</body>
</html>
